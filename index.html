<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flora AI — 花艺导购话术培训</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="apple-touch-icon" href="assets/flora-bouquet-icon-256.png">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.18);
            --glass-bg-strong: rgba(255, 255, 255, 0.28);
            --glass-bg-light: rgba(255, 255, 255, 0.10);
            --glass-border: rgba(255, 255, 255, 0.30);
            --glass-border-strong: rgba(255, 255, 255, 0.45);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.07);
            --glass-shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.10);
            --blur: blur(20px);
            --blur-strong: blur(28px);

            --sage: #8aaa86;
            --sage-light: rgba(138, 170, 134, 0.22);
            --rose: #c49a9a;
            --rose-light: rgba(196, 154, 154, 0.18);
            --text: #3a3232;
            --text-secondary: #685e5e;
            --text-muted: #968a8a;

            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --transition: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(228, 200, 200, 0.50) 0%, transparent 55%),
                radial-gradient(ellipse 70% 50% at 85% 20%, rgba(188, 210, 188, 0.40) 0%, transparent 55%),
                radial-gradient(ellipse 60% 50% at 50% 70%, rgba(240, 230, 220, 0.45) 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 10% 85%, rgba(210, 195, 210, 0.30) 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 90% 80%, rgba(220, 200, 190, 0.35) 0%, transparent 55%),
                linear-gradient(160deg, #f5ede4 0%, #eddfd8 15%, #e8e3d8 35%, #dfe6db 55%, #e8dcd8 75%, #f2ece6 100%);
            background-attachment: fixed;
        }

        body::before {
            content: '';
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            opacity: 0.022;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat: repeat; background-size: 256px 256px;
        }

        .app-shell { position: relative; z-index: 1; display: none; min-height: 100vh; }

        @media (min-width: 768px) {
            .app-shell.desktop { display: flex; }
            .app-shell.mobile  { display: none; }
        }
        @media (max-width: 767px) {
            .app-shell.desktop { display: none; }
            .app-shell.mobile  { display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
        }

        /* ---- Glass ---- */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--glass-shadow);
            transition: all var(--transition);
        }
        .glass.strong {
            background: var(--glass-bg-strong);
            backdrop-filter: var(--blur-strong);
            -webkit-backdrop-filter: var(--blur-strong);
            border-color: var(--glass-border-strong);
        }

        /* ---- Desktop Layout ---- */
        .desktop { display: flex; padding: 18px; gap: 18px; height: 100vh; align-items: stretch; }
        .desktop .sidebar-left  { width: 260px; flex-shrink: 0; display: flex; flex-direction: column; gap: 12px; }
        .desktop .main-content  { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .desktop .sidebar-right { width: 280px; flex-shrink: 0; display: flex; flex-direction: column; gap: 12px; }

        /* ---- Brand ---- */
        .brand-header { padding: 24px 22px 22px; text-align: center; }
        .brand-header h1 { font-size: 19px; font-weight: 700; letter-spacing: 1.5px; }
        .brand-header .tagline { font-size: 9px; color: var(--text-muted); letter-spacing: 3px; margin-top: 3px; }

        /* ---- Scene Nav ---- */
        .scene-nav { flex: 1; overflow-y: auto; padding: 4px 12px 12px; display: flex; flex-direction: column; gap: 3px; }
        .scene-nav::-webkit-scrollbar { width: 3px; }
        .scene-nav::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.06); border-radius: 10px; }
        .scene-nav-label {
            font-size: 9px; letter-spacing: 4px; color: var(--text-muted);
            padding: 6px 8px 4px; font-weight: 700;
        }
        .scene-nav-item {
            display: flex; flex-direction: column; gap: 1px;
            padding: 10px 14px; border-radius: var(--radius-md);
            cursor: pointer; transition: all var(--transition);
            border: 1px solid transparent; background: transparent;
            font-family: inherit; font-size: 13px; color: var(--text);
            text-align: left; width: 100%; position: relative;
        }
        .scene-nav-item::before {
            content: ''; width: 2px; height: 0; border-radius: 2px;
            background: var(--sage); position: absolute; left: -1px; top: 50%;
            transform: translateY(-50%); transition: height var(--transition);
        }
        .scene-nav-item:hover { background: var(--glass-bg-light); border-color: var(--glass-border); }
        .scene-nav-item:hover::before { height: 14px; }
        .scene-nav-item.active {
            background: var(--glass-bg-strong); border-color: var(--glass-border-strong);
            box-shadow: var(--glass-shadow);
        }
        .scene-nav-item.active::before { height: 22px; }
        .scene-nav-item .scene-name { font-weight: 650; font-size: 13px; }
        .scene-nav-item .scene-brief { font-size: 10px; color: var(--text-muted); }

        /* ---- Chat Panel ---- */
        .chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
        .chat-header {
            padding: 13px 20px; display: flex; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--glass-border); flex-shrink: 0;
        }
        .chat-header .active-dot {
            width: 7px; height: 7px; border-radius: 50%; background: var(--sage); flex-shrink: 0;
        }
        .chat-header h2 { font-size: 14px; font-weight: 700; flex: 1; }
        .chat-header .mode-tag {
            font-size: 8px; padding: 2px 10px; border-radius: 10px;
            background: var(--sage-light); color: var(--sage);
            letter-spacing: 2px; font-weight: 700;
        }
        .coach-toolbar {
            padding: 9px 20px; display: flex; align-items: center; justify-content: space-between;
            gap: 10px; border-bottom: 1px solid var(--glass-border); flex-shrink: 0;
        }
        .ai-status {
            display: inline-flex; align-items: center; gap: 11px;
            font-size: 10px; color: var(--text-muted); font-weight: 650;
            letter-spacing: 1px; white-space: nowrap;
        }
        .ai-status::before {
            content: ''; width: 6px; height: 6px; border-radius: 50%;
            background: var(--sage); box-shadow: 0 0 0 4px rgba(138,170,134,0.12);
        }
        .ai-status.fallback::before { background: var(--rose); box-shadow: 0 0 0 4px rgba(196,154,154,0.12); }
        .coach-actions { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 6px; }
        .coach-action {
            border: 1px solid var(--glass-border); background: var(--glass-bg-light);
            color: var(--text-secondary); border-radius: 16px; padding: 5px 10px;
            font-family: inherit; font-size: 11px; font-weight: 650; cursor: pointer;
            transition: all var(--transition);
        }
        .coach-action:hover { background: var(--glass-bg-strong); border-color: var(--glass-border-strong); color: var(--text); }
        .chat-messages { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 12px; }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.05); border-radius: 10px; }

        .msg { max-width: 88%; animation: msgIn 0.38s cubic-bezier(0.22, 0.61, 0.36, 1); }
        .msg.ai   { align-self: flex-start; }
        .msg.user { align-self: flex-end; }
        .msg-bubble { padding: 13px 17px; border-radius: var(--radius-md); line-height: 1.7; font-size: 13px; }
        .msg.ai .msg-bubble {
            background: var(--glass-bg-strong); backdrop-filter: var(--blur-strong);
            -webkit-backdrop-filter: var(--blur-strong);
            border: 1px solid var(--glass-border-strong); border-bottom-left-radius: 4px;
            box-shadow: var(--glass-shadow);
        }
        .msg.user .msg-bubble {
            background: var(--sage-light); backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid rgba(138,170,134,0.32); border-bottom-right-radius: 4px;
        }

        /* ---- Knowledge Card ---- */
        .kc {
            background: var(--glass-bg-strong); backdrop-filter: var(--blur-strong);
            -webkit-backdrop-filter: var(--blur-strong);
            border: 1px solid var(--glass-border-strong); border-radius: var(--radius-md);
            padding: 17px 19px; margin: 3px 0;
            box-shadow: var(--glass-shadow-lg);
            animation: cardIn 0.45s cubic-bezier(0.22, 0.61, 0.36, 1);
        }
        .kc .kc-badge {
            font-size: 9px; font-weight: 700; letter-spacing: 2.5px;
            color: var(--sage); margin-bottom: 5px;
        }
        .kc .kc-title { font-size: 15px; font-weight: 700; margin-bottom: 8px; line-height: 1.4; }
        .kc .kc-section { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--glass-border); }
        .kc .kc-section-label {
            font-size: 10px; font-weight: 700; letter-spacing: 2px;
            color: var(--sage); margin-bottom: 6px;
        }
        .kc .kc-section p, .kc .kc-section li { font-size: 12px; color: var(--text-secondary); line-height: 1.7; }
        .kc .kc-section ul, .kc .kc-section ol { padding-left: 16px; margin: 3px 0; }

        /* ---- Script Card ---- */
        .script-card {
            background: var(--rose-light); backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid rgba(196,154,154,0.22);
            border-radius: var(--radius-sm); padding: 13px 15px; margin: 7px 0;
            border-left: 2px solid var(--rose);
        }
        .script-card .script-label {
            font-size: 9px; font-weight: 700; letter-spacing: 2px;
            color: var(--rose); margin-bottom: 5px;
        }
        .script-card .script-text { font-size: 12px; color: var(--text); line-height: 1.8; font-style: italic; }

        /* ---- Chips ---- */
        .chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
        .chip-tag {
            display: inline-flex; padding: 3px 10px; border-radius: 14px;
            font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
            background: var(--glass-bg-light); border: 1px solid var(--glass-border);
            color: var(--text-secondary); transition: all var(--transition);
            cursor: pointer; font-family: inherit;
        }
        .chip-tag:hover { background: var(--glass-bg-strong); border-color: var(--glass-border-strong); }

        /* ---- Input ---- */
        .chat-input-row {
            padding: 11px 18px; display: flex; gap: 8px;
            border-top: 1px solid var(--glass-border); flex-shrink: 0;
        }
        .chat-input-row input {
            flex: 1; padding: 9px 15px; border-radius: 18px;
            border: 1px solid var(--glass-border-strong);
            background: var(--glass-bg-light); backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            font-size: 13px; font-family: inherit; color: var(--text); outline: none;
            transition: all var(--transition);
        }
        .chat-input-row input:focus {
            border-color: var(--sage); background: var(--glass-bg-strong);
            box-shadow: 0 0 0 3px rgba(138,170,134,0.08);
        }
        .chat-input-row input::placeholder { color: var(--text-muted); }
        .chat-input-row button {
            padding: 9px 17px; border-radius: 18px;
            border: 1px solid var(--glass-border-strong);
            background: var(--glass-bg-strong); backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            font-size: 13px; font-weight: 700; cursor: pointer;
            color: var(--text); font-family: inherit; transition: all var(--transition);
            white-space: nowrap; letter-spacing: 0.5px;
        }
        .chat-input-row button:hover { background: var(--sage-light); border-color: var(--sage); }
        .chat-input-row button:disabled, .mobile .mobile-input-row button:disabled {
            opacity: 0.55; cursor: wait;
        }

        /* ---- Right Sidebar ---- */
        .ref-panel { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
        .ref-panel::-webkit-scrollbar { width: 3px; }
        .ref-panel::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.05); border-radius: 10px; }
        .ref-label {
            font-size: 9px; letter-spacing: 4px; color: var(--text-muted);
            font-weight: 700; padding: 3px 4px 1px;
        }
        .ref-flower-item {
            display: flex; align-items: center; gap: 9px;
            padding: 9px 11px; border-radius: var(--radius-sm);
            cursor: pointer; transition: all var(--transition);
            border: 1px solid transparent; font-family: inherit;
            font-size: 12px; color: var(--text); background: transparent;
            text-align: left; width: 100%;
        }
        .ref-flower-item:hover { background: var(--glass-bg-light); border-color: var(--glass-border); }
        .ref-flower-item .ref-dot {
            width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
        }
        .ref-flower-item .ref-name { font-weight: 650; }
        .ref-flower-item .ref-meaning {
            font-size: 10px; color: var(--text-muted); margin-left: auto;
            text-align: right; max-width: 55%;
        }

        /* ---- Mobile ---- */
        .mobile .mobile-header { padding: 15px 14px 9px; text-align: center; flex-shrink: 0; }
        .mobile .mobile-header h1 { font-size: 15px; font-weight: 700; letter-spacing: 1px; }
        .mobile .mobile-header .tagline { font-size: 8px; color: var(--text-muted); letter-spacing: 2px; }

        .mobile .scene-strip {
            display: flex; overflow-x: auto; gap: 7px;
            padding: 5px 12px 9px; scroll-snap-type: x mandatory; flex-shrink: 0;
        }
        .mobile .scene-strip::-webkit-scrollbar { display: none; }
        .mobile .scene-chip {
            flex-shrink: 0; scroll-snap-align: start;
            display: flex; align-items: center; gap: 6px;
            padding: 9px 13px; border-radius: var(--radius-md);
            border: 1px solid var(--glass-border); background: var(--glass-bg);
            backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            cursor: pointer; transition: all var(--transition);
            font-family: inherit; color: var(--text);
        }
        .mobile .scene-chip .chip-bar {
            width: 2px; height: 16px; border-radius: 2px; flex-shrink: 0;
        }
        .mobile .scene-chip .chip-label { font-size: 11px; font-weight: 650; white-space: nowrap; }
        .mobile .scene-chip.active {
            background: var(--glass-bg-strong); border-color: var(--glass-border-strong);
            box-shadow: var(--glass-shadow);
        }

        .mobile .mobile-content { flex: 1; overflow-y: auto; padding: 6px 10px 10px; display: flex; flex-direction: column; gap: 8px; }
        .mobile .mobile-content::-webkit-scrollbar { display: none; }
        .mobile .mobile-coach-strip {
            display: flex; gap: 6px; overflow-x: auto; padding: 2px 10px 7px; flex-shrink: 0;
        }
        .mobile .mobile-coach-strip::-webkit-scrollbar { display: none; }
        .mobile .mobile-coach-strip .coach-action { flex-shrink: 0; font-size: 10px; padding: 5px 9px; }

        .mobile .bottom-tabs {
            display: flex; border-top: 1px solid var(--glass-border); flex-shrink: 0;
            background: var(--glass-bg-strong); backdrop-filter: var(--blur-strong);
            -webkit-backdrop-filter: var(--blur-strong);
        }
        .mobile .bottom-tab {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 10px 4px 13px; cursor: pointer; border: none;
            background: transparent; font-family: inherit;
            color: var(--text-muted); font-size: 11px; font-weight: 600;
            letter-spacing: 1px; transition: all var(--transition);
        }
        .mobile .bottom-tab.active { color: var(--sage); }

        .mobile .mobile-input-row { display: flex; gap: 7px; padding: 5px 10px 7px; flex-shrink: 0; }
        .mobile .mobile-input-row input {
            flex: 1; padding: 9px 13px; border-radius: 16px;
            border: 1px solid var(--glass-border-strong);
            background: var(--glass-bg-light); backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            font-size: 12px; font-family: inherit; outline: none; color: var(--text);
        }
        .mobile .mobile-input-row input:focus { border-color: var(--sage); }
        .mobile .mobile-input-row input::placeholder { color: var(--text-muted); }
        .mobile .mobile-input-row button {
            padding: 9px 13px; border-radius: 16px;
            border: 1px solid var(--glass-border-strong);
            background: var(--glass-bg-strong); backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            font-weight: 700; cursor: pointer; font-family: inherit;
            font-size: 12px; color: var(--text); white-space: nowrap;
        }

        /* ---- Copy Button ---- */
        .copy-btn {
            position: absolute; top: 8px; right: 8px;
            width: 26px; height: 26px; border-radius: 8px;
            border: 1px solid var(--glass-border); background: var(--glass-bg);
            backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: all var(--transition);
            color: var(--text-muted); font-size: 11px;
        }
        .msg:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { background: var(--glass-bg-strong); border-color: var(--glass-border-strong); color: var(--text); }
        .copy-btn.copied { opacity: 1; color: var(--sage); border-color: var(--sage); }
        .msg { position: relative; }

        /* ---- Animations ---- */
        @keyframes msgIn  { from { opacity: 0; transform: translateY(12px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes cardIn { from { opacity: 0; transform: translateY(18px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes breathe { 0%,100% { opacity: 0.3; } 50% { opacity: 0.85; } }
        .typing-dots { display: flex; gap: 4px; padding: 11px 16px; align-self: flex-start; }
        .typing-dots .dot {
            width: 5px; height: 5px; border-radius: 50%; background: var(--text-muted);
            animation: breathe 1.4s infinite ease-in-out;
        }
        .typing-dots .dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots .dot:nth-child(3) { animation-delay: 0.4s; }

        /* scene accent bars (mobile chips) */
        .bar-rose     { background: #c49a9a; }
        .bar-sage     { background: #8aaa86; }
        .bar-lavender { background: #a898b8; }
        .bar-sun      { background: #c8a870; }
        .bar-warm     { background: #b89480; }
        .bar-soft     { background: #b0a090; }
        .bar-blush    { background: #c89898; }
        .bar-ice      { background: #90a8b8; }
    </style>
</head>
<body>

<div class="app-shell desktop" id="desktopApp">
    <aside class="sidebar-left">
        <div class="glass strong brand-header">
            <h1>Flora AI</h1>
            <p class="tagline">花艺导购 · 话术培训</p>
        </div>
        <nav class="glass scene-nav" id="desktopSceneNav">
            <div class="scene-nav-label">销售场景</div>
        </nav>
    </aside>

    <main class="glass strong chat-panel" id="desktopMain">
        <div class="chat-header">
            <span class="active-dot" id="desktopHeaderDot"></span>
            <h2 id="desktopHeaderTitle">选择场景开始培训</h2>
            <span class="mode-tag">AI 教练</span>
        </div>
        <div class="coach-toolbar">
            <span class="ai-status" id="desktopAiStatus">DeepSeek 已接入</span>
            <div class="coach-actions">
                <button class="coach-action" onclick="quickAsk('请根据当前场景生成一段高转化导购话术')">生成话术</button>
                <button class="coach-action" onclick="quickAsk('请扮演顾客和我练习销售对话')">模拟顾客</button>
                <button class="coach-action" onclick="quickAsk('请指出这个场景最容易踩的销售禁忌')">避坑提醒</button>
                <button class="coach-action" onclick="clearChat()" title="清空所有对话记录">清空</button>
            </div>
        </div>
        <div class="chat-messages" id="desktopChatMessages">
            <div class="msg ai">
                <div class="msg-bubble">
                    欢迎使用 Flora AI <b>花艺导购话术培训系统</b>。<br><br>
                    我是您的 AI 教练，帮助您掌握不同场景下的<b>花材推荐</b>、<b>花语解读</b>、<b>搭配技巧</b>和<b>推销话术</b>。<br><br>
                    从左侧选择一个销售场景开始学习，或直接在下方输入顾客情况，我会即时生成知识卡片和话术模板。
                </div>
            </div>
        </div>
        <div class="chat-input-row">
            <input type="text" id="desktopInput" placeholder="描述顾客情况，例如：顾客想给女友道歉但不知道选什么花…" autocomplete="off">
            <button onclick="desktopSend()">提问</button>
        </div>
    </main>

    <aside class="sidebar-right">
        <div class="glass ref-panel" id="desktopRefPanel">
            <div class="ref-label">花语速查</div>
            <div id="desktopFlowerRef"></div>
        </div>
    </aside>
</div>

<!-- Mobile -->
<div class="app-shell mobile" id="mobileApp">
    <div class="mobile-header">
        <h1>Flora AI</h1>
        <p class="tagline">花艺导购 · 话术培训</p>
    </div>

// ---- Chat History (localStorage) ----
function saveHistory() {
    const desktopMsgs = document.getElementById('desktopChatMessages');
    if (!desktopMsgs) return;
    const messages = [];
    desktopMsgs.querySelectorAll('.msg').forEach(el => {
        const bubble = el.querySelector('.msg-bubble');
        if (bubble) messages.push({ html: bubble.innerHTML, ai: el.classList.contains('ai') });
    });
    try { localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(messages)); } catch {}
}

function loadHistory() {
    try {
        const raw = localStorage.getItem(CHAT_STORAGE_KEY);
        if (!raw) return false;
        const messages = JSON.parse(raw);
        if (!Array.isArray(messages) || messages.length === 0) return false;
        const dc = document.getElementById('desktopChatMessages');
        const mc = document.getElementById('mobileTabChat');
        dc.innerHTML = ''; mc.innerHTML = '';
        for (const m of messages) {
            const html = `<div class="msg-bubble" style="position:relative;">${m.html}</div>`;
            const dd = document.createElement('div'); dd.className = `msg ${m.ai ? 'ai' : 'user'}`;
            dd.innerHTML = html; dc.appendChild(dd);
            const md = document.createElement('div'); md.className = `msg ${m.ai ? 'ai' : 'user'}`;
            md.innerHTML = html; mc.appendChild(md);
        }
        dc.scrollTop = dc.scrollHeight; mc.scrollTop = mc.scrollHeight;
        return true;
    } catch { return false; }
}

function clearHistory() {
    try { localStorage.removeItem(CHAT_STORAGE_KEY); } catch {}
}

    clearHistory();
    const welcomeDesktop = `<div class="msg ai"><div class="msg-bubble">欢迎使用 Flora AI <b>花艺导购话术培训系统</b>。<br><br>我是您的 AI 教练，帮助您掌握不同场景下的<b>花材推荐</b>、<b>花语解读</b>、<b>搭配技巧</b>和<b>推销话术</b>。<br><br>从左侧选择一个销售场景开始学习，或直接在下方输入顾客情况，我会即时生成知识卡片和话术模板。</div></div>`;

function escapeHTML(value) {
    return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

function htmlToText(html) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    return (tmp.textContent || tmp.innerText || '').trim();
}

function copyMessage(btn) {
    const bubble = btn.closest('.msg').querySelector('.msg-bubble');
    if (!bubble) return;
    const text = htmlToText(bubble.innerHTML);
    navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✓'; btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 1500);
    }).catch(() => {});
}

function formatAIText(text) {
    let safe = escapeHTML(text);
    safe = safe
        .replace(/^###\s+(.+)$/gm, '<b>$1</b>')
        .replace(/^##\s+(.+)$/gm, '<b>$1</b>')
        .replace(/^#\s+(.+)$/gm, '<b>$1</b>')
        .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
        .replace(/^\s*[-*]\s+(.+)$/gm, '— $1');
    return safe.replace(/\n{2,}/g, '<br><br>').replace(/\n/g, '<br>');
}

function setAIStatus(text, fallback = false) {

function findScene(text) {
    const m = [
        { k: ['道歉','对不起','认错','错了','哄','生气','吵架','赔罪'], ids: ['apology'] },
        { k: ['妈妈','母亲','婆婆','岳母','老妈'], ids: ['mothers_day'] },
        { k: ['长辈','老人','奶奶','爷爷','外婆','外公','探望','病人','医院','住院','生病'], ids: ['hospital_visit'] },
        { k: ['告白','表白','追','喜欢','暗恋','示爱','追求'], ids: ['confession'] },
        { k: ['生日','过生日'], ids: ['girlfriend_birthday'] },
        { k: ['女友','女朋友','对象','老婆','恋人'], ids: ['girlfriend_birthday'] },
        { k: ['毕业','毕业典礼'], ids: ['graduation'] },
        { k: ['乔迁','搬家','新房','新居','入伙'], ids: ['housewarming'] },
        { k: ['结婚','婚礼','新婚','婚庆'], ids: ['wedding'] },
        { k: ['纪念日','周年','纪念'], ids: ['wedding'] },
    ];
    for (const e of m) for (const k of e.k) if (text.includes(k)) for (const id of e.ids) { const f = SCENES.find(s => s.id === id); if (f) return f; }
    return null;
}

function respond(text) {
    const s = getScene();
    const d = findScene(text);
    if (d && d.id !== currentSceneId) { currentSceneId = d.id; updateAllUI(); return { intro: `已识别场景：<b>${d.name}</b><br><br>作为专业花艺导购，遇到这类顾客时您需要掌握以下核心知识：`, scene: d }; }
    if (text.includes('花语') || text.includes('意思') || text.includes('含义')) {
        if (s) { const l = s.flowers.map(f => `<b>${f.name}</b> — ${f.language}`).join('<br>'); return { text: `<b>${s.name}</b> 场景推荐花材的花语：<br><br>${l}` }; }
        return { text: '请先选择一个场景，我再帮您介绍相关花材的花语。' };
    }
    if (text.includes('搭配') || text.includes('怎么搭') || text.includes('怎么包')) {
        if (s) { const l = s.flowers.map(f => `<b>${f.name}</b><br>${f.arrange}`).join('<br><br>'); return { text: `<b>${s.name}</b> 场景的花束搭配方案：<br><br>${l}` }; }
        return { text: '请先选择场景，我再教您具体的搭配技巧。' };
    }
    if (text.includes('话术') || text.includes('怎么说') || text.includes('怎么推销') || text.includes('怎么介绍')) {
        if (s) return { scene: s, showScripts: true };
        return { text: '请先选择场景，我来给您演示对应的推销话术。' };
    }
    if (text.includes('避免') || text.includes('不能') || text.includes('忌讳') || text.includes('注意')) {
        if (s) { const l = s.avoid.map(a => `— ${a}`).join('<br>'); return { text: `<b>${s.name}</b> 场景的避坑指南：<br><br>${l}` }; }
        return { text: '请先选择场景，我帮您梳理该场景的避坑指南。' };
    }
    if (s) return { intro: `<b>${s.name}</b> 场景 · 完整导购知识卡：`, scene: s };
    return { text: `我还没有完全确定您的场景。<br><br>您可以：<br>— 从左侧选择具体场景<br>— 或直接描述顾客情况，例如：<br>&nbsp;&nbsp;「顾客想给女友道歉」<br>&nbsp;&nbsp;「有顾客来买探望病人的花」<br>&nbsp;&nbsp;「有人要给妈妈选花」<br><br>我会自动匹配场景并生成话术。` };
}

async function askAI(text) {
    const scene = getScene();
    const res = await fetch(API_CHAT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            message: text,
            scene,
            flowerRef: FLOWER_REF
        })
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'AI request failed');
    return data.reply || '';
}

function desktopSend() {
    if (isSending) return;
    const inp = document.getElementById('desktopInput'); const t = inp.value.trim(); if (!t) return;
    appendDesktopMsg(t, false); inp.value = ''; process(t, 'desktop');
}
function appendDesktopMsg(text, ai, opts = {}) {
    const c = document.getElementById('desktopChatMessages');
    const d = document.createElement('div'); d.className = `msg ${ai ? 'ai' : 'user'}`;
    const copyBtn = ai ? '<button class="copy-btn" onclick="copyMessage(this)">复制</button>' : '';
    d.innerHTML = `<div class="msg-bubble" style="position:relative;">${ai ? text : escapeHTML(text)}${copyBtn}</div>`;
    c.appendChild(d); c.scrollTop = c.scrollHeight;
    if (!opts.skipSave) saveHistory();
}

async function process(text, pf) {
    const app = pf === 'desktop' ? appendDesktopMsg : appendMobileMsg;
    const ct = pf === 'desktop' ? document.getElementById('desktopChatMessages') : document.getElementById('mobileTabChat');
    const detected = findScene(text);
    if (detected && detected.id !== currentSceneId) {
        currentSceneId = detected.id;
        updateAllUI();
    }
    const td = document.createElement('div');
    td.innerHTML = '<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    td.id = 'typing-' + pf; ct.appendChild(td); ct.scrollTop = ct.scrollHeight;
    setSending(true);
    try {
        setAIStatus('DeepSeek 正在生成');
        const aiReply = await askAI(text);
        const el = document.getElementById('typing-' + pf); if (el) el.remove();
        app(formatAIText(aiReply), true);
        setAIStatus('DeepSeek 已接入');
        updateAllUI();
    } catch (err) {
        console.warn(err);
        const el = document.getElementById('typing-' + pf); if (el) el.remove();
        setAIStatus('AI 暂不可用，已切换本地规则', true);
        const r = respond(text);
        if (r.scene && r.intro) {
            app(r.intro, true);
            const cc = pf === 'desktop' ? document.getElementById('desktopChatMessages') : document.getElementById('mobileTabChat');
            const cd = document.createElement('div'); cd.className = 'msg ai';
            cd.innerHTML = renderSceneCard(r.scene); cc.appendChild(cd); cc.scrollTop = cc.scrollHeight;
            saveHistory();
            updateAllUI();
        } else if (r.scene && r.showScripts) {
            const sh = r.scene.scripts.map(s => `<div class="script-card"><div class="script-label">话术 · ${s.context}</div><div class="script-text">「${s.text}」</div></div>`).join('');
            app(`<b>${r.scene.name}</b> 场景推销话术模板：<br><br>${sh}`, true);
        } else if (r.text) { app(r.text, true); }
        updateAllUI();
    } finally {
        setSending(false);
    }
}

        h += `<div class="ref-label" style="margin-top:6px;">${s.name}</div>`;
        h += s.scripts.map(sc => `
            <div class="glass" style="padding:10px 12px;margin-bottom:5px;cursor:pointer;" onclick="selectScene('${s.id}');switchMobileTab('chat');">
                <div style="font-size:8px;font-weight:700;color:var(--rose);letter-spacing:2px;margin-bottom:3px;">${sc.context}</div>
                <div style="font-size:11px;color:var(--text-secondary);line-height:1.6;font-style:italic;">「${sc.text.substring(0, 70)}…」</div>
            </div>
        `).join('');
    }
    document.getElementById('mobileScriptList').innerHTML = h;
}

function appendMobileMsg(text, ai, opts = {}) {
    const c = document.getElementById('mobileTabChat');
    const d = document.createElement('div'); d.className = `msg ${ai ? 'ai' : 'user'}`;
    const copyBtn = ai ? '<button class="copy-btn" onclick="copyMessage(this)">复制</button>' : '';
    d.innerHTML = `<div class="msg-bubble" style="position:relative;">${ai ? text : escapeHTML(text)}${copyBtn}</div>`;
    c.appendChild(d); c.scrollTop = c.scrollHeight;
    if (!opts.skipSave) saveHistory();
}

function mobileSend() {
    if (isSending) return;
    const inp = document.getElementById('mobileInput'); const t = inp.value.trim(); if (!t) return;
    appendMobileMsg(t, false); inp.value = ''; process(t, 'mobile');
}

function switchMobileTab(tab) {
    document.querySelectorAll('#mobileApp .bottom-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    document.getElementById('mobileTabChat').style.display = tab === 'chat' ? 'flex' : 'none';
    document.getElementById('mobileTabKnowledge').style.display = tab === 'knowledge' ? 'flex' : 'none';
    document.getElementById('mobileTabScripts').style.display = tab === 'scripts' ? 'flex' : 'none';
    document.getElementById('mobileInputRow').style.display = tab === 'chat' ? 'flex' : 'none';
}

function quickAsk(text) {
    if (window.innerWidth >= 768) { document.getElementById('desktopInput').value = text; desktopSend(); }
    else { document.getElementById('mobileInput').value = text; switchMobileTab('chat'); mobileSend(); }
}

// ---- Scene Select ----
function selectScene(id) {
    currentSceneId = id; updateAllUI();
    const s = getScene(); if (!s) return;
    const isD = window.innerWidth >= 768;
    const app = isD ? appendDesktopMsg : appendMobileMsg;
    if (isD) {
        document.getElementById('desktopChatMessages').innerHTML = '';
        document.getElementById('desktopHeaderTitle').textContent = s.name + ' · 导购话术培训';
    } else { document.getElementById('mobileTabChat').innerHTML = ''; switchMobileTab('chat'); }
    app(`已选择场景：<b>${s.name}</b><br><br>${s.brief}<br><br>以下是该场景的<b>花材推荐</b>、<b>花语解读</b>、<b>搭配方案</b>和<b>推销话术</b>：`, true, { skipSave: true });
    const cc = isD ? document.getElementById('desktopChatMessages') : document.getElementById('mobileTabChat');
    const cd = document.createElement('div'); cd.className = 'msg ai';
    cd.innerHTML = renderSceneCard(s); cc.appendChild(cd); cc.scrollTop = cc.scrollHeight;
    saveHistory();
}

function updateAllUI() {
    buildDesktopSceneNav(); buildMobileSceneStrip();
    const s = getScene();
    if (s) document.getElementById('desktopHeaderTitle').textContent = s.name + ' · 导购话术培训';
}

// ---- Init ----
function init() {
    buildDesktopSceneNav(); buildDesktopFlowerRef();
    buildMobileSceneStrip(); buildMobileFlowerRef(); buildMobileScriptList();
    document.getElementById('desktopInput').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); desktopSend(); } });
    document.getElementById('mobileInput').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); mobileSend(); } });
    if (window.innerWidth < 768) switchMobileTab('chat');
    loadHistory();
}

window.selectScene = selectScene;
window.desktopSend = desktopSend;
window.mobileSend = mobileSend;
window.switchMobileTab = switchMobileTab;
window.quickAsk = quickAsk;
window.clearChat = clearChat;
window.copyMessage = copyMessage;
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
